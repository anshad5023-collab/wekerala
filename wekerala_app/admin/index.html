<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopLink Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">S</div>
        <h1>ShopLink</h1>
        <p>Admin Panel</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="admin-email" placeholder="admin@shoplink.in" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="admin-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-screen" class="screen">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon-sm">S</div>
        <span>ShopLink Admin</span>
      </div>
      <ul class="nav-links">
        <li class="nav-item active" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </li>
        <li class="nav-item" data-page="shops">
          <span class="nav-icon">🏪</span> Shops
        </li>
      </ul>
      <button id="logout-btn" class="btn-logout">Sign Out</button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page active">
        <div class="page-header">
          <h2>Dashboard</h2>
          <span id="last-updated" class="text-muted"></span>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">🏪</div>
            <div class="stat-info">
              <div class="stat-value" id="stat-total-shops">—</div>
              <div class="stat-label">Total Shops</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✨</div>
            <div class="stat-info">
              <div class="stat-value" id="stat-new-today">—</div>
              <div class="stat-label">New Today</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📦</div>
            <div class="stat-info">
              <div class="stat-value" id="stat-orders-today">—</div>
              <div class="stat-label">Orders Today</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
              <div class="stat-value" id="stat-active-shops">—</div>
              <div class="stat-label">Active Shops</div>
            </div>
          </div>
        </div>
        <div class="section-header">
          <h3>Recent Shops</h3>
        </div>
        <div id="recent-shops-list" class="shop-list"></div>
      </div>

      <!-- Shops Page -->
      <div id="page-shops" class="page">
        <div class="page-header">
          <h2>All Shops</h2>
        </div>
        <div class="search-bar">
          <input type="text" id="shop-search" placeholder="Search by name, phone, or district…" />
        </div>
        <div id="shops-list" class="shop-list"></div>
        <div id="shops-empty" class="empty-state hidden">No shops found.</div>
      </div>
    </main>
  </div>

  <!-- Shop Action Modal -->
  <div id="shop-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-shop-name">Shop Name</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-info">
          <span class="badge" id="modal-status-badge">Active</span>
          <span id="modal-phone" class="text-muted"></span>
          <span id="modal-district" class="text-muted"></span>
        </div>
        <div class="modal-section">
          <div class="info-row"><span>Shop Type</span><strong id="modal-type">—</strong></div>
          <div class="info-row"><span>Joined</span><strong id="modal-joined">—</strong></div>
          <div class="info-row"><span>Trial Ends</span><strong id="modal-trial-end">—</strong></div>
          <div class="info-row"><span>Payment</span><strong id="modal-payment">—</strong></div>
          <div class="info-row"><span>Total Orders</span><strong id="modal-orders">—</strong></div>
        </div>
        <div class="modal-actions">
          <button class="btn-action btn-verify" id="btn-verify-payment">✅ Verify Payment</button>
          <button class="btn-action btn-extend" id="btn-extend-trial">📅 Extend Trial 30 Days</button>
          <button class="btn-action btn-deactivate" id="btn-deactivate">🚫 Deactivate Shop</button>
          <button class="btn-action btn-activate" id="btn-activate" style="display:none">✅ Activate Shop</button>
        </div>
        <div id="modal-feedback" class="feedback-msg hidden"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
