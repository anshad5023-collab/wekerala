name: wekerala
description: Oratas — AI-powered shop management for Indian retailers
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.6.2
  firebase_storage: ^12.3.2
  firebase_remote_config: ^5.1.3
  firebase_messaging: ^15.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.3.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.0
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  fl_chart: ^0.69.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  share_plus: ^10.0.3
  pdf: ^3.11.1
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  image_cropper: ^9.0.0
  shared_preferences: ^2.3.2
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  flutter_animate: ^4.5.0
  package_info_plus: ^8.0.0
  webview_flutter: ^4.10.0
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4
  speech_to_text: ^7.0.0
  print_bluetooth_thermal: ^1.0.4
  esc_pos_utils_plus: ^2.0.4
  permission_handler: ^11.0.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - .env
