name: Build & Upload APK

on:
  push:
    branches: [master]
    paths:
      - 'wekerala_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Write .env
        working-directory: wekerala_app
        run: |
          cat > .env << 'EOF'
          STOREFRONT_BASE_URL=https://wekerala.vercel.app
          SHOPLINK_UPI_ID=${{ secrets.SHOPLINK_UPI_ID }}
          SUPPORT_WHATSAPP=${{ secrets.SUPPORT_WHATSAPP }}
          APP_VERSION=${{ github.run_number }}.0.0
          APK_STORAGE_PATH=apk/wekerala-latest.apk
          USE_FIREBASE_EMULATOR=false
          DEBUG_MODE=false
          GUPSHUP_API_KEY=${{ secrets.GUPSHUP_API_KEY }}
          GUPSHUP_APP_NAME=wekerala
          EOF

      - name: Write google-services.json
        working-directory: wekerala_app/android/app
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - run: flutter pub get
        working-directory: wekerala_app

      - name: Build release APK
        working-directory: wekerala_app
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wekerala-release-${{ github.run_number }}
          path: wekerala_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Oratas v1.0.${{ github.run_number }}"
          body: "Automatic release from build #${{ github.run_number }}"
          files: wekerala_app/build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Firebase Storage
        if: success()
        working-directory: wekerala_app
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install --prefix /tmp/gcs @google-cloud/storage 2>/dev/null
          node << 'SCRIPT'
          const { Storage } = require('/tmp/gcs/node_modules/@google-cloud/storage');
          const fs = require('fs');
          const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          const storage = new Storage({ credentials: sa });
          const bucket = storage.bucket('shoplink-prod.firebasestorage.app');
          const apkPath = 'build/app/outputs/flutter-apk/app-release.apk';
          const mb = (fs.statSync(apkPath).size / 1024 / 1024).toFixed(1);
          console.log(`APK size: ${mb} MB`);
          bucket.upload(apkPath, {
            destination: 'apk/wekerala-latest.apk',
            metadata: { contentType: 'application/vnd.android.package-archive' }
          }).then(() => {
            console.log('✅ Uploaded → gs://shoplink-prod.firebasestorage.app/apk/wekerala-latest.apk');
          }).catch(e => { console.error('Upload failed:', e.message); process.exit(1); });
          SCRIPT
