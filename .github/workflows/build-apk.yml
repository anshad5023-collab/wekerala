name: Build & Upload APK

on:
  push:
    branches: [master]
    paths:
      - 'wekerala_app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Write .env
        working-directory: wekerala_app
        run: |
          cat > .env << 'EOF'
          STOREFRONT_BASE_URL=https://wekerala.vercel.app
          SHOPLINK_UPI_ID=${{ secrets.SHOPLINK_UPI_ID }}
          SUPPORT_WHATSAPP=${{ secrets.SUPPORT_WHATSAPP }}
          APP_VERSION=${{ github.run_number }}.0.0
          APK_STORAGE_PATH=apk/wekerala-latest.apk
          USE_FIREBASE_EMULATOR=false
          DEBUG_MODE=false
          GUPSHUP_API_KEY=${{ secrets.GUPSHUP_API_KEY }}
          GUPSHUP_APP_NAME=wekerala
          EOF

      - name: Write google-services.json
        working-directory: wekerala_app/android/app
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Set up release keystore
        working-directory: wekerala_app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using release keystore from secrets"
            echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
            cat > key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF
            echo "✅ Release keystore written"
          else
            echo "⚠️  No KEYSTORE_BASE64 secret — using debug signing"
          fi

      - run: flutter pub get
        working-directory: wekerala_app

      - name: Build release APK
        working-directory: wekerala_app
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Auto-register signing SHA-1 in Firebase Console
        continue-on-error: true
        working-directory: wekerala_app
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          npm install --prefix /tmp/fb-reg google-auth-library 2>/dev/null
          node << 'SCRIPT'
          const { GoogleAuth } = require('/tmp/fb-reg/node_modules/google-auth-library');
          const { execSync } = require('child_process');

          async function main() {
            // Extract SHA-1 from the built APK signing certificate
            let sha1 = '';
            try {
              const out = execSync(
                'keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk',
                { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }
              );
              const m = out.match(/SHA1[:\s]+([0-9A-Fa-f:]{59})/i);
              if (m) sha1 = m[1].toUpperCase();
            } catch (e) {
              console.log('keytool error:', e.stderr || e.message);
            }

            if (!sha1) {
              console.log('❌ Could not read SHA-1 from APK — skipping auto-register');
              return;
            }
            console.log(`📱 APK signing SHA-1: ${sha1}`);

            // Parse project and app IDs from google-services.json
            const gsJson = JSON.parse(process.env.GOOGLE_SERVICES_JSON);
            const projectId = gsJson.project_info.project_id;
            const appId = gsJson.client[0].client_info.mobilesdk_app_id;
            console.log(`Project: ${projectId}  App: ${appId}`);

            // Get OAuth token from service account
            const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            const auth = new GoogleAuth({
              credentials: sa,
              scopes: [
                'https://www.googleapis.com/auth/firebase',
                'https://www.googleapis.com/auth/cloud-platform',
              ],
            });
            const client = await auth.getClient();
            const token = (await client.getAccessToken()).token;

            const base = `https://firebase.googleapis.com/v1beta1/projects/${projectId}/androidApps/${appId}/sha`;
            const headers = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };

            // Check if already registered
            const listRes = await fetch(base, { headers });
            const list = await listRes.json();
            const existing = (list.certificates || []).map(c => c.shaHash.toUpperCase());
            if (existing.some(h => h.replace(/:/g,'') === sha1.replace(/:/g,''))) {
              console.log('✅ SHA-1 already registered in Firebase Console — OTP should work');
              return;
            }

            // Register it
            const reg = await fetch(base, {
              method: 'POST',
              headers,
              body: JSON.stringify({ shaHash: sha1, certType: 'SHA_1' }),
            });
            const result = await reg.json();
            if (reg.ok) {
              console.log('✅ SHA-1 auto-registered in Firebase Console!');
              console.log('Phone OTP will now work on this APK.');
            } else {
              console.log(`⚠️ API error (${reg.status}):`, JSON.stringify(result));
              console.log(`Manual fallback: add SHA-1 ${sha1} to Firebase Console → Project Settings → Android app → SHA fingerprints`);
            }
          }

          main().catch(e => console.error('Registration error:', e.message));
          SCRIPT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wekerala-release-${{ github.run_number }}
          path: wekerala_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Oratas v1.0.${{ github.run_number }}"
          body: "Automatic release from build #${{ github.run_number }}"
          files: wekerala_app/build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Firebase Storage
        working-directory: wekerala_app
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install --prefix /tmp/gcs @google-cloud/storage 2>/dev/null
          node << 'SCRIPT'
          const { Storage } = require('/tmp/gcs/node_modules/@google-cloud/storage');
          const fs = require('fs');
          const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          const storage = new Storage({ credentials: sa });
          const bucket = storage.bucket('shoplink-prod.firebasestorage.app');
          const apkPath = 'build/app/outputs/flutter-apk/app-release.apk';
          const mb = (fs.statSync(apkPath).size / 1024 / 1024).toFixed(1);
          console.log(`APK size: ${mb} MB`);
          bucket.upload(apkPath, {
            destination: 'apk/wekerala-latest.apk',
            metadata: { contentType: 'application/vnd.android.package-archive' }
          }).then(() => {
            console.log('✅ Uploaded → gs://shoplink-prod.firebasestorage.app/apk/wekerala-latest.apk');
          }).catch(e => { console.error('Upload failed:', e.message); process.exit(1); });
          SCRIPT
